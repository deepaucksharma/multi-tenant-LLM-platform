# DPO config — shared structure, tenant specified at runtime
inherits: base_config.yaml

dpo:
  beta: 0.1
  loss_type: "sigmoid"
  max_prompt_length: 256
  max_length: 512

training:
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 2
  eval_strategy: "steps"
  eval_steps: 10
  save_strategy: "epoch"
  save_total_limit: 2
  fp16: true
  bf16: false
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  max_grad_norm: 1.0
  seed: 42
  report_to: "mlflow"
