# SFT config for Manufacturing tenant
# Tuned for AMD RX 6800 XT (16GB VRAM, gfx1030) + Qwen2.5-0.5B-Instruct
inherits: base_config.yaml

tenant:
  tenant_id: "mfg"
  domain: "Manufacturing / Industrial Quality Control"

data:
  train_path: "./data/mfg/sft/train_chat.json"
  eval_path: "./data/mfg/sft/eval_chat.json"

training:
  output_dir: "./models/adapters/mfg/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 5
  eval_strategy: "steps"
  eval_steps: 20
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 3
  fp16: true
  bf16: false
  gradient_checkpointing: false
  optim: "adamw_torch"
  max_grad_norm: 1.0
  seed: 42
  report_to: "mlflow"
